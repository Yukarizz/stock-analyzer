<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票分析助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #8892b0; font-size: 1.1em; }
    
    .search-box {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    .input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    input {
      flex: 1;
      min-width: 200px;
      padding: 15px 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.1em;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: #00d9ff; }
    input::placeholder { color: #8892b0; }
    
    button {
      padding: 15px 40px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,217,255,0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .result {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stock-header {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .stock-info h2 { font-size: 2em; margin-bottom: 10px; }
    .stock-code { color: #8892b0; font-size: 1.2em; }
    .stock-price {
      text-align: right;
    }
    .price {
      font-size: 3em;
      font-weight: bold;
      color: #00ff88;
    }
    .price.down { color: #ff4757; }
    .change {
      font-size: 1.3em;
      margin-top: 5px;
    }
    .change.up { color: #00ff88; }
    .change.down { color: #ff4757; }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card-label { color: #8892b0; font-size: 0.9em; margin-bottom: 8px; }
    .card-value { font-size: 1.8em; font-weight: bold; }
    
    .analysis-section {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    
    .score-box {
      text-align: center;
      padding: 30px;
    }
    .score {
      font-size: 5em;
      font-weight: bold;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .score-label { color: #8892b0; font-size: 1.2em; margin-top: 10px; }
    
    .tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.95em;
      margin: 5px;
    }
    .tag.good { background: rgba(0,255,136,0.2); color: #00ff88; }
    .tag.warn { background: rgba(255,166,0,0.2); color: #ffa600; }
    .tag.bad { background: rgba(255,71,87,0.2); color: #ff4757; }
    
    .list-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .list-item:last-child { border-bottom: none; }
    
    .suggestion {
      font-size: 1.4em;
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, rgba(0,217,255,0.1), rgba(0,255,136,0.1));
      border-radius: 12px;
      border: 2px solid rgba(0,217,255,0.3);
    }
    
    .error {
      background: rgba(255,71,87,0.2);
      border: 2px solid #ff4757;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #ff4757;
      margin-top: 20px;
    }
    
    footer {
      text-align: center;
      padding: 40px 0;
      color: #8892b0;
      font-size: 0.9em;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 1.8em; }
      .stock-price { text-align: left; }
      .price { font-size: 2em; }
      .input-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 股票分析助手</h1>
      <p class="subtitle">输入股票代码，获取实时行情与智能分析（支持 A 股、港股）</p>
    </header>
    
    <div class="search-box">
      <div class="input-group">
        <input type="text" id="stockCode" placeholder="输入股票代码，如：300308、600519 或港股 00700、09988" />
        <button onclick="analyzeStock()" id="analyzeBtn">分析</button>
      </div>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在分析股票数据...</p>
    </div>
    
    <div class="error" id="error" style="display:none;"></div>
    
    <div class="result" id="result">
      <div class="stock-header">
        <div class="stock-info">
          <h2 id="stockName">--</h2>
          <p class="stock-code" id="stockCodeDisplay">--</p>
        </div>
        <div class="stock-price">
          <div class="price" id="stockPrice">--</div>
          <div class="change" id="stockChange">--</div>
        </div>
      </div>
      
      <div class="cards">
        <div class="card">
          <div class="card-label">市盈率 (PE)</div>
          <div class="card-value" id="peValue">--</div>
        </div>
        <div class="card">
          <div class="card-label">市净率 (PB)</div>
          <div class="card-value" id="pbValue">--</div>
        </div>
        <div class="card">
          <div class="card-label">总市值</div>
          <div class="card-value" id="marketCap">--</div>
        </div>
        <div class="card">
          <div class="card-label">涨跌幅</div>
          <div class="card-value" id="changePercent">--</div>
        </div>
      </div>
      
      <div class="analysis-section">
        <h3 class="section-title">🎯 综合评分</h3>
        <div class="score-box">
          <div class="score" id="scoreValue">--</div>
          <div class="score-label">满分 100 分</div>
        </div>
      </div>
      
      <div class="analysis-section">
        <h3 class="section-title">📊 分析结果</h3>
        <div style="margin-bottom: 20px;">
          <span class="tag" id="valuationTag">估值：--</span>
          <span class="tag" id="trendTag">趋势：--</span>
        </div>
        <div class="suggestion" id="suggestionText">--</div>
      </div>
      
      <div class="analysis-section">
        <h3 class="section-title">✨ 亮点</h3>
        <div id="highlightsList"></div>
      </div>
      
      <div class="analysis-section">
        <h3 class="section-title">⚠️ 风险提示</h3>
        <div id="risksList"></div>
      </div>
    </div>
    
    <footer>
      <p>数据来源于公开市场信息 · 仅供参考，不构成投资建议</p>
    </footer>
  </div>
  
  <script>
    // 获取 API 基础 URL
    const API_BASE = window.location.origin;
    
    // 支持回车键搜索
    document.getElementById('stockCode').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') analyzeStock();
    });
    
    async function analyzeStock() {
      const code = document.getElementById('stockCode').value.trim();
      if (!code) {
        showError('请输入股票代码');
        return;
      }
      
      // 显示加载状态
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = true;
      
      try {
        const response = await fetch(`${API_BASE}/api/analyze/${code}`);
        const result = await response.json();
        
        if (result.success) {
          displayResult(result.data);
        } else {
          showError(result.message || '分析失败，请检查股票代码');
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
        console.error(error);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('analyzeBtn').disabled = false;
      }
    }
    
    function displayResult(data) {
      // 基本信息
      document.getElementById('stockName').textContent = data.name || '--';
      document.getElementById('stockCodeDisplay').textContent = data.code;
      
      const priceEl = document.getElementById('stockPrice');
      const changeEl = document.getElementById('stockChange');
      
      priceEl.textContent = data.price ? `${data.price.toFixed(2)}元` : '--';
      priceEl.className = 'price' + (data.change >= 0 ? '' : ' down');
      
      const changeSign = data.change >= 0 ? '+' : '';
      changeEl.textContent = `${changeSign}${data.change?.toFixed(2)} (${changeSign}${data.changePercent?.toFixed(2)}%)`;
      changeEl.className = 'change' + (data.change >= 0 ? ' up' : ' down');
      
      // 卡片数据
      document.getElementById('peValue').textContent = data.pe ? data.pe.toFixed(2) : '--';
      document.getElementById('pbValue').textContent = data.pb ? data.pb.toFixed(2) : '--';
      document.getElementById('marketCap').textContent = formatNumber(data.totalMarketCap);
      document.getElementById('changePercent').textContent = data.changePercent ? `${data.changePercent >= 0 ? '+' : ''}${data.changePercent.toFixed(2)}%` : '--';
      document.getElementById('changePercent').style.color = data.changePercent >= 0 ? '#00ff88' : '#ff4757';
      
      // 分析结果
      if (data.analysis) {
        document.getElementById('scoreValue').textContent = data.analysis.score;
        
        const valuationTag = document.getElementById('valuationTag');
        valuationTag.textContent = `估值：${data.analysis.valuation}`;
        valuationTag.className = 'tag ' + getTagClass(data.analysis.valuation);
        
        const trendTag = document.getElementById('trendTag');
        trendTag.textContent = `趋势：${data.analysis.trend}`;
        trendTag.className = 'tag ' + getTagClass(data.analysis.trend);
        
        document.getElementById('suggestionText').textContent = data.analysis.suggestion;
        
        // 亮点
        const highlightsHtml = data.analysis.highlights
          .map(h => `<div class="list-item">✨ ${h}</div>`)
          .join('');
        document.getElementById('highlightsList').innerHTML = highlightsHtml;
        
        // 风险
        const risksHtml = data.analysis.risks
          .map(r => `<div class="list-item">⚠️ ${r}</div>`)
          .join('');
        document.getElementById('risksList').innerHTML = risksHtml;
      }
      
      document.getElementById('result').style.display = 'block';
    }
    
    function getTagClass(text) {
      if (text.includes('低') || text.includes('强势') || text.includes('上涨')) return 'good';
      if (text.includes('高') || text.includes('下跌') || text.includes('风险')) return 'bad';
      return 'warn';
    }
    
    function showError(message) {
      document.getElementById('error').textContent = message;
      document.getElementById('error').style.display = 'block';
    }
    
    function formatNumber(num) {
      if (!num) return '--';
      if (num >= 1e12) return (num / 1e12).toFixed(2) + '万亿';
      if (num >= 1e8) return (num / 1e8).toFixed(2) + '亿';
      if (num >= 1e4) return (num / 1e4).toFixed(2) + '万';
      return num.toFixed(2);
    }
  </script>
</body>
</html>
