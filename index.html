<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票分析助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #8892b0; font-size: 1.1em; }
    
    .search-box {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    .input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    input {
      flex: 1;
      min-width: 200px;
      padding: 15px 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.1em;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: #00d9ff; }
    input::placeholder { color: #8892b0; }
    
    button {
      padding: 15px 40px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,217,255,0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .result {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stock-header {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .stock-info h2 { font-size: 2em; margin-bottom: 10px; }
    .stock-code { color: #8892b0; font-size: 1.2em; }
    .stock-price {
      text-align: right;
    }
    .price {
      font-size: 3em;
      font-weight: bold;
      color: #00ff88;
    }
    .price.down { color: #ff4757; }
    .change {
      font-size: 1.3em;
      margin-top: 5px;
    }
    .change.up { color: #00ff88; }
    .change.down { color: #ff4757; }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card-label { color: #8892b0; font-size: 0.9em; margin-bottom: 8px; }
    .card-value { font-size: 1.8em; font-weight: bold; }
    
    .analysis-section {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .analysis-section h3 {
      margin-bottom: 20px;
      color: #00d9ff;
    }
    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(#00ff88 var(--score), rgba(255,255,255,0.1) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }
    .score-circle::before {
      content: '';
      width: 90px;
      height: 90px;
      background: #1a1a2e;
      border-radius: 50%;
      position: absolute;
    }
    .score-text {
      font-size: 2em;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }
    
    .tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      margin: 5px;
    }
    .tag-buy { background: rgba(0,255,136,0.2); color: #00ff88; }
    .tag-sell { background: rgba(255,71,87,0.2); color: #ff4757; }
    .tag-hold { background: rgba(255,193,7,0.2); color: #ffc107; }
    
    .risk-list, .highlight-list {
      list-style: none;
    }
    .risk-list li, .highlight-list li {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .risk-list li::before {
      content: '⚠️ ';
    }
    .highlight-list li::before {
      content: '✨ ';
    }
    
    .error {
      background: rgba(255,71,87,0.2);
      border: 1px solid #ff4757;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #ff4757;
      display: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8em; }
      .price { font-size: 2em; }
      .input-group { flex-direction: column; }
      input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 股票分析助手</h1>
      <p class="subtitle">输入股票代码，获取实时行情与智能分析（支持 A 股、港股）</p>
    </header>

    <div class="search-box">
      <div class="input-group">
        <input type="text" id="stockCode" placeholder="输入股票代码，如：300308、600519 或港股 00700、09988" />
        <button onclick="analyzeStock()">分析</button>
      </div>
    </div>

    <div class="error" id="error"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在分析股票数据...</p>
    </div>

    <div class="result" id="result">
      <div class="stock-header">
        <div class="stock-info">
          <h2 id="stockName">--</h2>
          <div class="stock-code" id="stockCodeDisplay">--</div>
        </div>
        <div class="stock-price">
          <div class="price" id="stockPrice">--</div>
          <div class="change" id="stockChange">--</div>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-label">市盈率 (PE)</div>
          <div class="card-value" id="pe">--</div>
        </div>
        <div class="card">
          <div class="card-label">市净率 (PB)</div>
          <div class="card-value" id="pb">--</div>
        </div>
        <div class="card">
          <div class="card-label">总市值</div>
          <div class="card-value" id="marketCap">--</div>
        </div>
        <div class="card">
          <div class="card-label">涨跌幅</div>
          <div class="card-value" id="changePercent">--</div>
        </div>
      </div>

      <div class="analysis-section">
        <h3>🎯 综合评分</h3>
        <div class="score-circle" id="scoreCircle">
          <div class="score-text" id="score">--</div>
        </div>
        <p style="text-align: center; color: #8892b0;">满分 100 分</p>
      </div>

      <div class="analysis-section">
        <h3>📊 分析结果</h3>
        <div style="margin-bottom: 20px;">
          <span class="tag" id="valuationTag">估值：--</span>
          <span class="tag" id="trendTag">趋势：--</span>
        </div>
        <div style="background: rgba(0,217,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
          <strong>操作建议：</strong>
          <span id="suggestion">--</span>
        </div>
      </div>

      <div class="analysis-section">
        <h3>✨ 亮点</h3>
        <ul class="highlight-list" id="highlights">
          <li>暂无特别亮点</li>
        </ul>
      </div>

      <div class="analysis-section">
        <h3>⚠️ 风险提示</h3>
        <ul class="risk-list" id="risks">
          <li>暂无重大风险</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    // 直接调用新浪财经 API（无需后端服务器）
    async function fetchStockData(code) {
      // 判断市场类型
      let symbol;
      const codeNum = parseInt(code);
      
      if (code.length === 5 || (code.length === 4 && codeNum >= 1 && codeNum <= 9999)) {
        // 港股
        symbol = `hk${code}`;
      } else if (code.startsWith('6')) {
        symbol = `sh${code}`;
      } else if (code.startsWith('4') || code.startsWith('8')) {
        symbol = `bj${code}`;
      } else {
        symbol = `sz${code}`;
      }

      try {
        // 使用腾讯财经 API（支持 CORS）
        const response = await fetch(`https://qt.gtimg.cn/q=${symbol}`);
        const buffer = await response.arrayBuffer();
        const decoder = new TextDecoder('gbk');
        const data = decoder.decode(buffer);
        
        if (!data.includes('=')) {
          throw new Error('无效的股票代码');
        }

        const parts = data.split('=')[1].replace(/"/g, '').split('~');
        
        if (symbol.startsWith('hk')) {
          // 港股数据格式
          return {
            code: code,
            name: parts[1],
            price: parseFloat(parts[3]),
            preClose: parseFloat(parts[4]),
            open: parseFloat(parts[5]),
            high: parseFloat(parts[33]),
            low: parseFloat(parts[34]),
            change: parseFloat(parts[3]) - parseFloat(parts[4]),
            changePercent: ((parseFloat(parts[3]) - parseFloat(parts[4])) / parseFloat(parts[4]) * 100),
            volume: parseFloat(parts[36]),
            pe: parseFloat(parts[52]) || 0,
            pb: parseFloat(parts[53]) || 0,
            marketCap: parseFloat(parts[44]) || 0,
            isHK: true
          };
        } else {
          // A股数据格式
          return {
            code: code,
            name: parts[1],
            price: parseFloat(parts[3]),
            preClose: parseFloat(parts[4]),
            open: parseFloat(parts[5]),
            high: parseFloat(parts[33]),
            low: parseFloat(parts[34]),
            change: parseFloat(parts[3]) - parseFloat(parts[4]),
            changePercent: ((parseFloat(parts[3]) - parseFloat(parts[4])) / parseFloat(parts[4]) * 100),
            volume: parseFloat(parts[36]),
            pe: parseFloat(parts[52]) || 0,
            pb: parseFloat(parts[53]) || 0,
            marketCap: parseFloat(parts[44]) || 0,
            isHK: false
          };
        }
      } catch (error) {
        console.error('获取数据失败:', error);
        throw error;
      }
    }

    function analyzeData(data) {
      const { pe, pb, changePercent, isHK } = data;
      
      // 估值判断
      let valuation = '合理';
      if (isHK) {
        if (pe > 30) valuation = '偏高';
        if (pe > 50) valuation = '高估';
        if (pe > 0 && pe < 10) valuation = '偏低';
        if (pe > 0 && pe < 5) valuation = '低估';
      } else {
        if (pe > 50) valuation = '偏高';
        if (pe > 80) valuation = '高估';
        if (pe > 0 && pe < 20) valuation = '偏低';
        if (pe > 0 && pe < 10) valuation = '低估';
      }

      // 趋势判断
      let trend = '震荡';
      if (changePercent > 3) trend = '强势上涨';
      if (changePercent > 5) trend = '大幅上涨';
      if (changePercent < -3) trend = '弱势下跌';
      if (changePercent < -5) trend = '大幅下跌';

      // 操作建议
      let suggestion = '持有观望';
      if (isHK) {
        if (pe > 0 && pe < 10 && changePercent > 0) suggestion = '可考虑买入';
        if (pe > 40 && changePercent > 5) suggestion = '注意风险，可考虑减仓';
      } else {
        if (pe > 0 && pe < 20 && changePercent > 0) suggestion = '可考虑买入';
        if (pe > 60 && changePercent > 5) suggestion = '注意风险，可考虑减仓';
      }
      if (changePercent < -5 && pe > 0 && pe < 30) suggestion = '可逢低布局';

      // 计算评分
      let score = 50;
      if (pe > 0 && pe < (isHK ? 10 : 20)) score += 20;
      else if (pe > 0 && pe < (isHK ? 20 : 40)) score += 10;
      else if (pe > (isHK ? 40 : 60)) score -= 15;
      
      if (changePercent > 3) score += 15;
      else if (changePercent > 1) score += 5;
      else if (changePercent < -3) score -= 15;
      
      if (pb > 0 && pb < 2) score += 10;
      else if (pb > 10) score -= 10;
      
      score = Math.max(0, Math.min(100, score));

      // 风险提示
      const risks = [];
      if (pe > (isHK ? 30 : 50)) risks.push('估值偏高，存在回调风险');
      if (pe > (isHK ? 50 : 80)) risks.push('估值过高，需谨慎');
      if (pb > 10) risks.push('市净率较高');
      if (changePercent > 5) risks.push('短期涨幅较大，注意获利回吐');
      if (changePercent < -5) risks.push('短期跌幅较大，注意继续下行风险');
      if (risks.length === 0) risks.push('暂无重大风险');

      // 亮点
      const highlights = [];
      if (pe > 0 && pe < (isHK ? 10 : 20)) highlights.push('估值处于较低水平');
      if (changePercent > 3) highlights.push('今日表现强势');
      if (pb > 0 && pb < 3) highlights.push('市净率较低，安全边际高');
      if (highlights.length === 0) highlights.push('暂无特别亮点');

      return {
        valuation,
        trend,
        suggestion,
        score,
        risks,
        highlights
      };
    }

    async function analyzeStock() {
      const code = document.getElementById('stockCode').value.trim();
      if (!code) {
        showError('请输入股票代码');
        return;
      }

      // 显示加载
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      try {
        const data = await fetchStockData(code);
        const analysis = analyzeData(data);
        
        // 更新页面
        document.getElementById('stockName').textContent = data.name;
        document.getElementById('stockCodeDisplay').textContent = 
          `${data.code} (${data.isHK ? '港股' : 'A股'})`;
        document.getElementById('stockPrice').textContent = `¥${data.price.toFixed(2)}`;
        
        const changeEl = document.getElementById('stockChange');
        changeEl.textContent = `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)} (${data.changePercent >= 0 ? '+' : ''}${data.changePercent.toFixed(2)}%)`;
        changeEl.className = 'change ' + (data.change >= 0 ? 'up' : 'down');
        
        document.getElementById('stockPrice').className = 'price ' + (data.change >= 0 ? '' : 'down');
        
        document.getElementById('pe').textContent = data.pe > 0 ? data.pe.toFixed(2) : '--';
        document.getElementById('pb').textContent = data.pb > 0 ? data.pb.toFixed(2) : '--';
        document.getElementById('marketCap').textContent = data.marketCap > 0 ? 
          (data.marketCap / 10000).toFixed(2) + '亿' : '--';
        document.getElementById('changePercent').textContent = 
          `${data.changePercent >= 0 ? '+' : ''}${data.changePercent.toFixed(2)}%`;
        
        // 评分
        document.getElementById('score').textContent = analysis.score;
        document.getElementById('scoreCircle').style.setProperty('--score', `${analysis.score * 3.6}deg`);
        
        // 标签
        document.getElementById('valuationTag').textContent = `估值：${analysis.valuation}`;
        document.getElementById('trendTag').textContent = `趋势：${analysis.trend}`;
        document.getElementById('suggestion').textContent = analysis.suggestion;
        
        // 亮点和风险
        document.getElementById('highlights').innerHTML = 
          analysis.highlights.map(h => `<li>${h}</li>`).join('');
        document.getElementById('risks').innerHTML = 
          analysis.risks.map(r => `<li>${r}</li>`).join('');
        
        // 显示结果
        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
      } catch (error) {
        showError('获取数据失败，请检查股票代码是否正确');
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    // 回车键触发
    document.getElementById('stockCode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        analyzeStock();
      }
    });
  </script>
</body>
</html>
